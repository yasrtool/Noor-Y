<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>معايدة العيد 💘</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink: #ff6b9d;
    --pink-light: #ffb3d1;
    --pink-deep: #e91e8c;
    --gold: #ffd700;
    --cream: #fff8f5;
    --rose: #ff4d8d;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #ffe0ef 0%, #ffc2d9 30%, #ffadd0 60%, #ff85b8 100%);
    font-family: 'Tajawal', sans-serif;
    overflow-x: hidden;
    position: relative;
  }

  /* ===== LANDING SCREEN ===== */
  #landing {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 100;
    background: radial-gradient(ellipse at center, #ffe4f0 0%, #ffc0d8 50%, #ff8fbf 100%);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  #landing.hide {
    opacity: 0;
    pointer-events: none;
    transform: scale(1.1);
  }

  .landing-kitty {
    font-size: 5rem;
    animation: floatKitty 3s ease-in-out infinite;
    margin-bottom: 1.5rem;
    filter: drop-shadow(0 10px 20px rgba(255,100,160,0.4));
  }

  @keyframes floatKitty {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-20px) rotate(5deg); }
  }

  #enter-btn {
    background: linear-gradient(135deg, #ff6b9d, #e91e8c);
    color: white;
    border: none;
    padding: 1.2rem 3.5rem;
    border-radius: 50px;
    font-size: 1.6rem;
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 10px 40px rgba(233,30,140,0.45), 0 0 0 0 rgba(233,30,140,0.4);
    animation: pulse 2s ease-in-out infinite;
    letter-spacing: 1px;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  #enter-btn::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 60%);
    transform: scale(0);
    transition: transform 0.5s;
  }

  #enter-btn:active::before { transform: scale(1); }

  #enter-btn:hover {
    transform: translateY(-4px) scale(1.04);
    box-shadow: 0 18px 50px rgba(233,30,140,0.55);
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 10px 40px rgba(233,30,140,0.45), 0 0 0 0 rgba(233,30,140,0.4); }
    50% { box-shadow: 0 10px 40px rgba(233,30,140,0.45), 0 0 0 18px rgba(233,30,140,0); }
  }

  .landing-sub {
    margin-top: 1.2rem;
    color: rgba(180,0,90,0.7);
    font-size: 1rem;
    font-weight: 300;
    letter-spacing: 2px;
  }

  /* ===== MAIN GREETING SCREEN ===== */
  #main {
    display: none;
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem 3rem;
    position: relative;
    overflow: hidden;
  }

  #main.visible { display: flex; }

  /* ===== FALLING KITTIES ===== */
  .kitty-rain {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  .kitty-drop {
    position: absolute;
    font-size: 2.2rem;
    top: -80px;
    animation: fall linear forwards;
    opacity: 0;
  }

  @keyframes fall {
    0%   { opacity: 0; transform: translateY(0) rotate(0deg) scale(0.5); }
    5%   { opacity: 1; }
    90%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(110vh) rotate(360deg) scale(1); }
  }

  /* ===== BACKGROUND SPARKLES ===== */
  .sparkle-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  .sparkle {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  /* ===== CARD ===== */
  .card {
    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1.5px solid rgba(255, 180, 210, 0.6);
    border-radius: 30px;
    padding: 2.5rem 2.5rem 2rem;
    max-width: 560px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(233,30,140,0.18), 0 4px 20px rgba(255,107,157,0.2);
    position: relative;
    z-index: 20;
    opacity: 0;
    transform: translateY(60px) scale(0.9);
    transition: opacity 0.9s cubic-bezier(0.22,1,0.36,1), transform 0.9s cubic-bezier(0.22,1,0.36,1);
  }

  .card.animate-in {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  .card::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 32px;
    background: linear-gradient(135deg, #ff6b9d44, #ffd70033, #ff6b9d44);
    z-index: -1;
    animation: borderGlow 3s ease-in-out infinite;
  }

  @keyframes borderGlow {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* ===== HEADER KITTY ROW ===== */
  .kitty-row {
    font-size: 2.5rem;
    letter-spacing: 8px;
    margin-bottom: 1.2rem;
    display: flex;
    justify-content: center;
    gap: 0.3rem;
    flex-wrap: wrap;
  }

  .kitty-row span {
    display: inline-block;
    animation: bouncePop ease-in-out infinite;
  }

  .kitty-row span:nth-child(1) { animation-duration: 1.8s; animation-delay: 0s; }
  .kitty-row span:nth-child(2) { animation-duration: 2.1s; animation-delay: 0.2s; }
  .kitty-row span:nth-child(3) { animation-duration: 1.6s; animation-delay: 0.4s; }
  .kitty-row span:nth-child(4) { animation-duration: 2.3s; animation-delay: 0.1s; }
  .kitty-row span:nth-child(5) { animation-duration: 1.9s; animation-delay: 0.3s; }

  @keyframes bouncePop {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    30% { transform: translateY(-12px) rotate(-8deg); }
    60% { transform: translateY(-5px) rotate(6deg); }
  }

  /* ===== HEADLINE ===== */
  .headline {
    font-family: 'Tajawal', sans-serif;
    font-weight: 900;
    font-size: clamp(1.25rem, 4vw, 1.7rem);
    line-height: 1.7;
    background: linear-gradient(135deg, #e91e8c, #ff6b9d, #ffd700, #ff4d8d);
    background-size: 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s linear infinite;
    margin-bottom: 0.8rem;
    text-shadow: none;
    position: relative;
  }

  @keyframes shimmer {
    0% { background-position: 0%; }
    100% { background-position: 300%; }
  }

  .heart-icon {
    display: inline-block;
    -webkit-text-fill-color: #e91e8c;
    animation: heartbeat 1.2s ease-in-out infinite;
    font-size: 1.5rem;
    vertical-align: middle;
    margin-right: 2px;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    14% { transform: scale(1.3); }
    28% { transform: scale(1); }
    42% { transform: scale(1.2); }
  }

  /* ===== DIVIDER ===== */
  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1rem 0;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, #ff6b9d, transparent);
  }

  .divider-icon { font-size: 1.2rem; }

  /* ===== POEM ===== */
  .poem {
    font-family: 'Amiri', serif;
    font-size: clamp(1.1rem, 3.5vw, 1.45rem);
    line-height: 2.2;
    color: #8b0057;
    font-style: italic;
    position: relative;
    padding: 1.2rem 1rem;
    margin: 0.5rem 0;
  }

  .poem::before {
    content: '❝';
    position: absolute;
    top: 0; right: 0;
    font-size: 3rem;
    color: rgba(233,30,140,0.12);
    font-family: serif;
    line-height: 1;
  }

  .poem::after {
    content: '❞';
    position: absolute;
    bottom: 0; left: 0;
    font-size: 3rem;
    color: rgba(233,30,140,0.12);
    font-family: serif;
    line-height: 1;
  }

  .poem-line {
    display: block;
    opacity: 0;
    transform: translateX(30px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }

  .poem-line.show {
    opacity: 1;
    transform: translateX(0);
  }

  /* ===== FOOTER SECTION ===== */
  .footer-hearts {
    font-size: 1.4rem;
    letter-spacing: 6px;
    margin-top: 1.5rem;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  /* ===== EID BADGE ===== */
  .eid-badge {
    display: inline-block;
    background: linear-gradient(135deg, #ffd700, #ffaa00);
    color: #7a4000;
    font-weight: 900;
    font-size: 0.95rem;
    padding: 0.45rem 1.5rem;
    border-radius: 50px;
    letter-spacing: 3px;
    margin-bottom: 1.2rem;
    box-shadow: 0 4px 20px rgba(255,170,0,0.35);
    animation: badgeGlow 2s ease-in-out infinite;
  }

  @keyframes badgeGlow {
    0%, 100% { box-shadow: 0 4px 20px rgba(255,170,0,0.35); }
    50% { box-shadow: 0 6px 30px rgba(255,170,0,0.6); }
  }

  /* ===== CONFETTI PETALS ===== */
  .petal {
    position: fixed;
    pointer-events: none;
    z-index: 5;
    font-size: 1.5rem;
    animation: petalFall linear forwards;
    opacity: 0;
  }

  @keyframes petalFall {
    0%   { opacity: 0; transform: translateY(0) rotate(0deg) translateX(0); }
    10%  { opacity: 1; }
    50%  { transform: translateY(50vh) rotate(180deg) translateX(30px); }
    90%  { opacity: 0.5; }
    100% { opacity: 0; transform: translateY(105vh) rotate(360deg) translateX(-20px); }
  }

  /* ===== MUSIC NOTE ===== */
  .music-note {
    position: fixed;
    bottom: 1.5rem;
    left: 1.5rem;
    z-index: 50;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,107,157,0.4);
    border-radius: 50px;
    padding: 0.6rem 1.2rem;
    font-size: 0.85rem;
    color: #c0005a;
    display: none;
    align-items: center;
    gap: 0.5rem;
    animation: noteWave 1.5s ease-in-out infinite;
  }

  .music-note.show { display: flex; }

  @keyframes noteWave {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .music-dot {
    width: 8px; height: 8px;
    background: #e91e8c;
    border-radius: 50%;
    animation: blink 1s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* ===== N LETTER EXPLOSION ===== */
  .n-letter {
    position: fixed;
    pointer-events: none;
    z-index: 200;
    font-family: 'Tajawal', sans-serif;
    font-weight: 900;
    color: #e91e8c;
    text-shadow: 0 0 20px rgba(233,30,140,0.6), 0 0 40px rgba(255,107,157,0.4);
    animation: nExplode ease-out forwards;
    opacity: 0;
    user-select: none;
  }

  @keyframes nExplode {
    0%   { opacity: 0; transform: translate(0,0) scale(0) rotate(0deg); }
    15%  { opacity: 1; transform: translate(var(--tx), var(--ty)) scale(1.4) rotate(var(--rot)); }
    40%  { opacity: 1; transform: translate(calc(var(--tx)*1.6), calc(var(--ty)*1.6)) scale(1) rotate(calc(var(--rot)*1.5)); }
    80%  { opacity: 0.6; }
    100% { opacity: 0; transform: translate(calc(var(--tx)*2.5), calc(var(--ty)*2.5 + 80px)) scale(0.4) rotate(calc(var(--rot)*2)); }
  }

  /* ===== TRANSITION FLASH ===== */
  #transition-flash {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, #ffb3d1, #ff6b9d, #e91e8c);
    z-index: 150;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }

  #transition-flash.flash-in {
    opacity: 1;
    pointer-events: all;
  }
</style>
</head>
<body>

<!-- Transition flash -->
<div id="transition-flash"></div>

<!-- Audio -->
<audio id="bgMusic" loop preload="auto">
  <source src="https://files.catbox.moe/6jgcy4.mp3" type="audio/mpeg">
</audio>

<!-- Sparkle background -->
<div class="sparkle-bg" id="sparkleBg"></div>

<!-- Kitty rain container -->
<div class="kitty-rain" id="kittyRain"></div>

<!-- ===== LANDING ===== -->
<div id="landing">
  <div class="landing-kitty">🎀</div>
  <button id="enter-btn" onclick="startGreeting()">مرحباً طيفتي 🩷</button>
  <p class="landing-sub">✨ اضغطي لتفتحي المعايدة ✨</p>
</div>

<!-- ===== MAIN GREETING ===== -->
<div id="main">
  <div class="card" id="card">
    <div class="eid-badge">🌙 عيد مبارك 🌙</div>

    <div class="kitty-row">
      <span>🎀</span>
      <span>🩷</span>
      <span>🐱</span>
      <span>🩷</span>
      <span>🎀</span>
    </div>

    <div class="headline">
      كلُّ عامٍ وأنتِ روحي التي لا يمكنني العيش بدونها
      <br>
      <span class="heart-icon">💘</span>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-icon">🌸</span>
      <div class="divider-line"></div>
    </div>

    <div class="poem">
      <span class="poem-line" id="line1">وما العيدُ إلا ربيعٌ أنتِ زهرتهُ،</span>
      <span class="poem-line" id="line2">وأنتِ فيهِ نسيمُ النهرِ والشجرُ.</span>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-icon">🌸</span>
      <div class="divider-line"></div>
    </div>

    <div class="footer-hearts">💗 🎀 💗 🎀 💗</div>
  </div>
</div>

<!-- Music indicator -->
<div class="music-note" id="musicNote">
  <div class="music-dot"></div>
  🎵 تشغيل
</div>

<script>
  // ===== Sparkles =====
  function createSparkles() {
    const bg = document.getElementById('sparkleBg');
    for (let i = 0; i < 40; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      const size = Math.random() * 5 + 2;
      s.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%; top:${Math.random()*100}%;
        animation-duration:${1.5 + Math.random()*3}s;
        animation-delay:${Math.random()*3}s;
      `;
      bg.appendChild(s);
    }
  }
  createSparkles();

  // ===== Kitty Rain =====
  const kitties = ['🎀','🐱','💗','🌸','⭐','💝','🩷','✨','🌺'];

  function spawnKitty() {
    const rain = document.getElementById('kittyRain');
    const el = document.createElement('div');
    el.className = 'kitty-drop';
    el.textContent = kitties[Math.floor(Math.random() * kitties.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.fontSize = (1.5 + Math.random() * 2) + 'rem';
    const dur = 3 + Math.random() * 4;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = (Math.random() * 2) + 's';
    rain.appendChild(el);
    setTimeout(() => el.remove(), (dur + 2) * 1000);
  }

  // ===== Petals =====
  const petalEmojis = ['🌸','🌺','🌹','💐','🌷'];

  function spawnPetal() {
    const el = document.createElement('div');
    el.className = 'petal';
    el.textContent = petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '-60px';
    const dur = 5 + Math.random() * 5;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = (Math.random() * 1) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), (dur + 2) * 1000);
  }

  // ===== N Letter Explosion =====
  function spawnN() {
    const el = document.createElement('div');
    el.className = 'n-letter';
    el.textContent = 'N';

    const cx = Math.random() * window.innerWidth;
    const cy = Math.random() * window.innerHeight;
    el.style.left = cx + 'px';
    el.style.top  = cy + 'px';

    const angle = Math.random() * Math.PI * 2;
    const dist  = 80 + Math.random() * 180;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    const rot = (Math.random() - 0.5) * 720;
    const size = 1.5 + Math.random() * 3.5;
    const dur  = 1.2 + Math.random() * 1.2;

    el.style.setProperty('--tx', tx + 'px');
    el.style.setProperty('--ty', ty + 'px');
    el.style.setProperty('--rot', rot + 'deg');
    el.style.fontSize = size + 'rem';
    el.style.animationDuration = dur + 's';

    // random pink/gold colors
    const colors = ['#e91e8c','#ff6b9d','#ffd700','#ff4d8d','#c0005a','#ffaa00','#ff85b8'];
    el.style.color = colors[Math.floor(Math.random() * colors.length)];

    document.body.appendChild(el);
    setTimeout(() => el.remove(), (dur + 0.3) * 1000);
  }

  function burstN(count) {
    for (let i = 0; i < count; i++) {
      setTimeout(spawnN, i * 30);
    }
  }

  // ===== Main function =====
  function startGreeting() {
    const flash = document.getElementById('transition-flash');

    // 1) Burst N letters immediately
    burstN(60);

    // 2) Flash transition after 0.4s
    setTimeout(() => {
      flash.classList.add('flash-in');
    }, 400);

    // 3) During flash: hide landing, show main
    setTimeout(() => {
      document.getElementById('landing').classList.add('hide');
      const main = document.getElementById('main');
      main.classList.add('visible');
    }, 600);

    // 4) Fade out flash
    setTimeout(() => {
      flash.classList.remove('flash-in');
    }, 800);

    // 5) Second burst of N after transition
    setTimeout(() => burstN(40), 850);

    // 6) Play music
    const music = document.getElementById('bgMusic');
    music.volume = 0.75;
    const playPromise = music.play();
    if (playPromise !== undefined) {
      playPromise.then(() => {
        document.getElementById('musicNote').classList.add('show');
      }).catch(() => {});
    }

    // 7) Animate card
    setTimeout(() => {
      document.getElementById('card').classList.add('animate-in');
    }, 700);

    // 8) Animate poem lines
    setTimeout(() => document.getElementById('line1').classList.add('show'), 1100);
    setTimeout(() => document.getElementById('line2').classList.add('show'), 1700);

    // 9) Ongoing N sprinkle for 5s
    let nCount = 0;
    const nInterval = setInterval(() => {
      spawnN();
      nCount++;
      if (nCount > 30) clearInterval(nInterval);
    }, 150);

    // 10) Kitty rain burst
    for (let i = 0; i < 25; i++) {
      setTimeout(spawnKitty, i * 120 + 500);
    }
    setInterval(spawnKitty, 400);

    // 11) Flower petals
    for (let i = 0; i < 10; i++) {
      setTimeout(spawnPetal, i * 300 + 800);
    }
    setInterval(spawnPetal, 800);
  }
</script>
</body>
</html>
